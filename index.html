<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelWithMe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --ink: #1a1612;
    --ink-muted: #6b6460;
    --ink-faint: #bdb8b3;
    --paper: #faf8f5;
    --paper-warm: #f3ede6;
    --card: #ffffff;
    --accent: #c46b3a;
    --accent-light: #f6e9df;
    --accent-dim: #8a4b28;
    --green: #3a6b4a;
    --green-light: #dff0e5;
    --border: #e8e2db;
    --shadow: 0 1px 3px rgba(26,22,18,0.07), 0 4px 16px rgba(26,22,18,0.04);
    --r: 12px;
    --r-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--paper);
    position: sticky; top: 0; z-index: 20;
    gap: 12px;
  }
  .brand { display: flex; flex-direction: column; gap: 1px; }
  .brand-name { font-family: 'DM Serif Display', serif; font-size: 17px; letter-spacing: -0.01em; color: var(--ink); line-height: 1; }
  .brand-name span { color: var(--accent); }
  .brand-tagline { font-size: 11px; color: var(--ink-faint); font-weight: 400; }
  .reset-btn {
    font-size: 12px; font-weight: 500; color: var(--ink-muted);
    background: none; border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 20px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }
  .reset-btn svg { width: 11px; height: 11px; }

  /* ── Trip State bar (full width, below header) ── */
  .state-bar {
    width: 100%;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px 20px;
    align-items: flex-start;
  }
  .state-bar-group {
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 80px;
  }
  .state-bar-label {
    font-size: 9px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-faint);
  }
  .state-bar-section {
    display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
  }
  .state-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--ink);
    background: var(--paper-warm);
    padding: 2px 7px; border-radius: 4px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .state-chip.empty { color: var(--ink-faint); background: none; border-color: transparent; font-family: 'DM Sans', sans-serif; font-style: italic; font-size: 10px; }
  .state-chip.true-val { background: var(--green-light); color: var(--green); border-color: #b0d9be; }
  .state-chip.false-val { background: var(--paper-warm); color: var(--ink-muted); }
  .state-chip.stage-chip { background: var(--accent-light); color: var(--accent-dim); border-color: #e0c0a8; font-weight: 600; }
  .state-divider { width: 1px; background: var(--border); align-self: stretch; margin: 0 4px; }

  /* ── Main layout ── */
  .app {
    display: flex;
    flex: 1;
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
    padding: 20px 24px;
    gap: 20px;
    align-items: flex-start;
  }

  /* ── Chat panel ── */
  .chat-panel {
    flex: 0 0 420px;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .messages {
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    height: 480px;
    padding-bottom: 8px;
  }

  .msg { display: flex; gap: 10px; animation: fadeUp 0.22s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .avatar.scout { background: var(--accent-light); color: var(--accent-dim); }
  .avatar.user-av { background: var(--ink); color: var(--paper); }

  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: var(--r);
    font-size: 13.5px;
    line-height: 1.65;
    border: 1px solid transparent;
  }
  .msg.assistant .bubble { background: var(--card); border-color: var(--border); box-shadow: var(--shadow); border-bottom-left-radius: 4px; }
  .msg.user .bubble { background: var(--ink); color: var(--paper); border-bottom-right-radius: 4px; }

  /* Typing */
  .typing-bubble { display: flex; gap: 5px; align-items: center; padding: 10px 14px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-faint); animation: pulse 1.2s ease infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100% { transform: scale(0.75); opacity: 0.45; } 40% { transform: scale(1); opacity: 1; } }

  /* Generate button */
  .generate-wrap { display: none; margin: 12px 0 2px 38px; animation: fadeUp 0.25s ease; }
  .generate-wrap.visible { display: block; }
  .generate-btn {
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--r-sm);
    padding: 9px 18px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 7px;
    transition: background 0.15s, transform 0.1s;
  }
  .generate-btn:hover { background: var(--accent-dim); }
  .generate-btn:active { transform: scale(0.97); }
  .generate-btn:disabled { background: var(--ink-faint); cursor: not-allowed; }
  .generate-btn svg { width: 14px; height: 14px; }

  /* Input area */
  .input-area { margin-top: 12px; display: flex; gap: 8px; align-items: flex-end; }
  .input-wrap {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); display: flex; padding: 9px 13px;
    box-shadow: var(--shadow); transition: border-color 0.15s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  textarea {
    flex: 1; border: none; outline: none; resize: none; background: transparent;
    font-family: 'DM Sans', sans-serif; font-size: 13.5px; line-height: 1.5;
    color: var(--ink); min-height: 22px; max-height: 110px;
  }
  textarea::placeholder { color: var(--ink-faint); }
  .send-btn {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--accent); color: #fff; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .send-btn:hover { background: var(--accent-dim); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--ink-faint); cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }

  /* Quick chips */
  .quick-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 12px; }
  .chip {
    font-size: 11.5px; padding: 4px 10px;
    background: var(--paper-warm); border: 1px solid var(--border);
    border-radius: 20px; cursor: pointer; transition: all 0.15s; color: var(--ink);
    font-family: 'DM Sans', sans-serif;
  }
  .chip:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent-dim); }

  /* ── Recommendations panel (right) ── */
  .reco-panel {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .reco-panel-empty {
    height: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px dashed var(--border);
    border-radius: var(--r);
    color: var(--ink-faint);
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
  }

  .reco-panel-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-muted);
    display: flex; align-items: center; gap: 6px;
  }
  .reco-panel-label-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  .reco-cards { display: flex; flex-direction: column; gap: 10px; }

  .reco-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px 18px;
    box-shadow: var(--shadow);
  }
  .reco-card.rank-1 { border-color: var(--accent); border-width: 1.5px; }

  .reco-head { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
  .rank-badge {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); color: #fff;
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .reco-name { font-weight: 600; font-size: 15px; flex: 1; }
  .reco-best { font-size: 10px; font-weight: 600; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; background: var(--accent-light); padding: 2px 7px; border-radius: 4px; }

  .match-sections { display: flex; flex-direction: column; gap: 8px; }
  .match-section { font-size: 12.5px; }
  .match-heading { font-weight: 600; color: var(--ink); margin-bottom: 3px; }
  .match-points { padding-left: 15px; color: var(--ink-muted); }
  .match-points li { margin-bottom: 2px; }

  .budget-row { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .budget-chip {
    font-family: 'DM Mono', monospace; font-size: 11px;
    background: var(--accent-light); color: var(--accent-dim);
    padding: 2px 8px; border-radius: 4px;
  }
  .verdict-chip {
    font-size: 11px; background: var(--green-light); color: var(--green);
    padding: 2px 8px; border-radius: 4px;
  }

  .tradeoffs { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .tradeoff-label { font-size: 10px; font-weight: 600; color: var(--ink-faint); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .tradeoff-item { font-size: 12px; color: var(--ink-muted); display: flex; gap: 5px; align-items: flex-start; margin-bottom: 2px; }
  .tradeoff-item::before { content: "↗"; font-size: 10px; margin-top: 1px; flex-shrink: 0; color: var(--ink-faint); }

  .confirm-btn {
    margin-top: 12px; background: var(--ink); color: var(--paper);
    font-size: 12px; font-weight: 500; padding: 7px 14px; border-radius: 6px;
    border: none; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
  }
  .confirm-btn:hover { background: var(--accent); }

  /* Error bubble */
  .error-bubble {
    background: #fff0f0; border: 1px solid #f0c0c0; border-radius: var(--r-sm);
    padding: 10px 14px; font-size: 13px; color: #a03030;
    margin-top: 4px;
  }

  /* scrollbar */
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 860px) {
    .app { flex-direction: column; padding: 12px; }
    .chat-panel { flex: none; width: 100%; }
    .messages { height: 340px; }
    .reco-panel-empty { height: 160px; }
    .state-bar { padding: 8px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-name">Travel<span>WithMe</span></div>
    <div class="brand-tagline">Helping you choose your destination and plan your trip with confidence.</div>
  </div>
  <button class="reset-btn" onclick="resetTrip()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 .49-3.54"></path></svg>
    Reset trip
  </button>
</header>

<!-- Trip State Bar -->
<div class="state-bar" id="stateBar"></div>

<div class="app">

  <!-- Chat -->
  <div class="chat-panel">
    <div class="messages" id="messages"></div>

    <div class="generate-wrap" id="generateWrap">
      <button class="generate-btn" id="generateBtn" onclick="handleGenerate()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
        Generate Recommendations
      </button>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="userInput" placeholder="Tell Scout about your trip…" rows="1"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="handleSend()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

    <div class="quick-chips">
      <div class="chip" onclick="fillInput('Planning a trip from Bangalore, 3 friends')">Bangalore · 3 friends</div>
      <div class="chip" onclick="fillInput('September, budget ₹30,000 total')">Sep · ₹30k total</div>
      <div class="chip" onclick="fillInput('3 nights, bachelorette vibe')">3 nights · bachelorette</div>
      <div class="chip" onclick="fillInput('Nothing else, we\'re good')">Nothing else</div>
      <div class="chip" onclick="fillInput('Let\'s go with Pondicherry')">Confirm Pondicherry</div>
    </div>
  </div>

  <!-- Recommendations panel -->
  <div class="reco-panel" id="recoPanel">
    <div class="reco-panel-empty" id="recoEmpty">
      Recommendations will appear here<br>once Scout is ready and you tap Generate.
    </div>
  </div>

</div>

<script>
// ── Endpoints ─────────────────────────────────────────────────────────────────
const API = {
  scout_message: 'https://twm.app.n8n.cloud/webhook/scout/message',
  meridian_match: 'https://twm.app.n8n.cloud/webhook/meridian/match',
  scout_present:  'https://twm.app.n8n.cloud/webhook/scout/present',
};

// ── TripState ─────────────────────────────────────────────────────────────────
const DEFAULT_STATE = () => ({
  trip_id: 'trip_' + Math.random().toString(36).slice(2, 8),
  status: 'free',
  stage: 'matching',
  trip_context: {
    required_inputs: {
      origin_city: null, budget: null, budget_unit: null,
      duration_nights: null, num_travelers: null, travel_month: null
    },
    preferences: {},
    selected_option: null
  },
  matcher_state: {
    generate_ready: false,
    conversation_context: { last_scout_message: null, awaiting: null },
    last_recommendations: null
  },
  planner_state: null
});

let tripState;
let busy = false;

function loadState() {
  const raw = localStorage.getItem('twm_trip_state_v2');
  if (raw) { try { tripState = JSON.parse(raw); return; } catch(e) {} }
  tripState = DEFAULT_STATE();
}

function saveState() {
  localStorage.setItem('twm_trip_state_v2', JSON.stringify(tripState));
  renderStateBar();
}

function deepMerge(target, source) {
  for (const key of Object.keys(source)) {
    if (source[key] !== null && typeof source[key] === 'object' && !Array.isArray(source[key])) {
      if (!target[key] || typeof target[key] !== 'object') target[key] = {};
      deepMerge(target[key], source[key]);
    } else {
      target[key] = source[key];
    }
  }
}

function applyStateDelta(delta) {
  if (!delta) return;
  if (delta.trip_context) {
    if (delta.trip_context.required_inputs)
      deepMerge(tripState.trip_context.required_inputs, delta.trip_context.required_inputs);
    if (delta.trip_context.preferences)
      deepMerge(tripState.trip_context.preferences, delta.trip_context.preferences);
    if (delta.trip_context.selected_option !== undefined)
      tripState.trip_context.selected_option = delta.trip_context.selected_option;
  }
  if (delta.matcher_state) deepMerge(tripState.matcher_state, delta.matcher_state);
}

// ── Console logging ───────────────────────────────────────────────────────────
function logScoutTurn(userMsg, stateBefore, response, stateAfter) {
  const id = tripState.trip_id;
  console.group(`%c trip id: ${id}`, 'color:#c46b3a;font-weight:700;font-size:13px;');
  console.log('%cUser message:', 'color:#6b6460;font-weight:600;', userMsg);
  console.log('%cTrip state (before):', 'color:#6b6460;font-weight:600;', JSON.parse(JSON.stringify(stateBefore)));
  console.log('---');
  console.log('%cScout response:', 'color:#3a6b4a;font-weight:600;', response);
  console.log('%cTrip state (after):', 'color:#3a6b4a;font-weight:600;', JSON.parse(JSON.stringify(stateAfter)));
  console.groupEnd();
}

function logMeridianTurn(input, output) {
  console.group('%c Meridian', 'color:#7090e0;font-weight:700;font-size:13px;');
  console.log('%cMeridian input:', 'color:#6b6460;font-weight:600;', JSON.parse(JSON.stringify(input)));
  console.log('%cMeridian output:', 'color:#3a6b4a;font-weight:600;', output);
  console.groupEnd();
}

// ── Real API calls ────────────────────────────────────────────────────────────
async function callScoutMessage(userMsg) {
  const stateBefore = JSON.parse(JSON.stringify(tripState));
  const body = { trip_state: tripState, message: userMsg };
  const res = await fetch(API.scout_message, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`Scout /message ${res.status}`);
  const data = await res.json();
  logScoutTurn(userMsg, stateBefore, data, tripState);
  return data;
}

async function callMeridianMatch() {
  const input = { trip_context: tripState.trip_context };
  const res = await fetch(API.meridian_match, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(input)
  });
  if (!res.ok) throw new Error(`Meridian /match ${res.status}`);
  const data = await res.json();
  logMeridianTurn(input, data);
  return data;
}

async function callScoutPresent(meridianOutput, context) {
  const stateBefore = JSON.parse(JSON.stringify(tripState));
  const body = { trip_state: tripState, meridian_output: meridianOutput, context };
  const res = await fetch(API.scout_present, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`Scout /present ${res.status}`);
  const data = await res.json();
  logScoutTurn('[present]', stateBefore, data, tripState);
  return data;
}

// ── State bar render ──────────────────────────────────────────────────────────
function renderStateBar() {
  const ri = tripState.trip_context.required_inputs;
  const prefs = tripState.trip_context.preferences;
  const ms = tripState.matcher_state;

  const chip = (val, cls='') => {
    if (val == null || val === '') return `<span class="state-chip empty">—</span>`;
    return `<span class="state-chip ${cls}">${val}</span>`;
  };
  const boolChip = (v) => `<span class="state-chip ${v ? 'true-val' : 'false-val'}">${v}</span>`;

  const prefKeys = Object.keys(prefs);
  const prefChips = prefKeys.length === 0
    ? chip(null)
    : prefKeys.map(k => {
        const v = prefs[k];
        const disp = typeof v === 'object' && v.value ? v.value : (Array.isArray(v) ? v.join(', ') : String(v));
        return `<span class="state-chip">${k}: ${disp}</span>`;
      }).join('');

  document.getElementById('stateBar').innerHTML = `
    <div class="state-bar-group">
      <div class="state-bar-label">Stage</div>
      <div class="state-bar-section">${chip(tripState.stage, 'stage-chip')}</div>
    </div>
    <div class="state-divider"></div>
    <div class="state-bar-group">
      <div class="state-bar-label">required_inputs</div>
      <div class="state-bar-section">
        ${chip(ri.origin_city)} ${chip(ri.num_travelers ? ri.num_travelers + ' pax' : null)}
        ${chip(ri.travel_month)} ${chip(ri.duration_nights ? ri.duration_nights + ' nights' : null)}
        ${chip(ri.budget ? '₹' + ri.budget.toLocaleString('en-IN') + (ri.budget_unit === 'per_person' ? '/pp' : ' total') : null)}
      </div>
    </div>
    <div class="state-divider"></div>
    <div class="state-bar-group">
      <div class="state-bar-label">preferences</div>
      <div class="state-bar-section">${prefChips}</div>
    </div>
    <div class="state-divider"></div>
    <div class="state-bar-group">
      <div class="state-bar-label">generate_ready</div>
      <div class="state-bar-section">${boolChip(ms.generate_ready)}</div>
    </div>
    <div class="state-bar-group">
      <div class="state-bar-label">awaiting</div>
      <div class="state-bar-section">${chip(ms.conversation_context?.awaiting)}</div>
    </div>
    <div class="state-bar-group">
      <div class="state-bar-label">selected_option</div>
      <div class="state-bar-section">${chip(tripState.trip_context.selected_option?.id)}</div>
    </div>
  `;
}

// ── Recommendations panel ─────────────────────────────────────────────────────
function renderRecos(options, finalRec) {
  const panel = document.getElementById('recoPanel');
  panel.innerHTML = '';

  const label = document.createElement('div');
  label.className = 'reco-panel-label';
  label.innerHTML = `<div class="reco-panel-label-dot"></div>Recommendations`;
  panel.appendChild(label);

  const cards = document.createElement('div');
  cards.className = 'reco-cards';

  options.forEach(opt => {
    const card = document.createElement('div');
    card.className = `reco-card${opt.rank === 1 ? ' rank-1' : ''}`;

    let html = `<div class="reco-head">
      <div class="rank-badge">${opt.rank}</div>
      <div class="reco-name">${opt.name}</div>
      ${opt.rank === 1 ? `<span class="reco-best">Best match</span>` : ''}
    </div><div class="match-sections">`;

    (opt.match_sections || []).forEach(sec => {
      html += `<div class="match-section"><div class="match-heading">${sec.heading}</div>`;
      if (sec.points) html += `<ul class="match-points">${sec.points.map(p=>`<li>${p}</li>`).join('')}</ul>`;
      if (sec.per_person_total) {
        html += `<div class="budget-row">
          <span class="budget-chip">₹${sec.per_person_total.toLocaleString('en-IN')} / person</span>
          ${sec.group_total ? `<span class="budget-chip">₹${sec.group_total.toLocaleString('en-IN')} total</span>` : ''}
          ${sec.verdict ? `<span class="verdict-chip">${sec.verdict}</span>` : ''}
        </div>`;
      }
      html += `</div>`;
    });

    html += `</div>`;

    if (opt.tradeoffs?.length) {
      html += `<div class="tradeoffs"><div class="tradeoff-label">Trade-offs</div>`;
      opt.tradeoffs.forEach(t => { html += `<div class="tradeoff-item">${t.point}</div>`; });
      html += `</div>`;
    }

    if (opt.rank === 1) {
      html += `<button class="confirm-btn" onclick="quickConfirm('${opt.name}')">Confirm ${opt.name} →</button>`;
    }

    card.innerHTML = html;
    cards.appendChild(card);
  });

  panel.appendChild(cards);
}

// ── Chat helpers ──────────────────────────────────────────────────────────────
function appendMsg(role, content) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = `avatar ${role === 'assistant' ? 'scout' : 'user-av'}`;
  av.textContent = role === 'assistant' ? 'S' : 'U';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = md(content);
  div.appendChild(av);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function appendError(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = `<div class="avatar scout">S</div><div class="error-bubble">${text}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function md(text) {
  if (!text) return '';
  return String(text).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant'; div.id = 'typing-ind';
  div.innerHTML = `<div class="avatar scout">S</div><div class="bubble"><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping() { document.getElementById('typing-ind')?.remove(); }

// ── Handlers ──────────────────────────────────────────────────────────────────
async function handleSend() {
  const input = document.getElementById('userInput');
  const msg = input.value.trim();
  if (!msg || busy) return;
  busy = true;
  input.value = ''; input.style.height = 'auto';
  setSendDisabled(true);

  appendMsg('user', msg);
  showTyping();

  try {
    const res = await callScoutMessage(msg);

    applyStateDelta(res.state_delta);
    if (res.stage) tripState.stage = res.stage;
    if (typeof res.generate_ready === 'boolean') tripState.matcher_state.generate_ready = res.generate_ready;
    if (res.confirmed_destination) tripState.trip_context.selected_option = res.confirmed_destination;

    // Log after applying delta
    console.log('%cTrip state (after apply):', 'color:#3a6b4a;font-weight:600;', JSON.parse(JSON.stringify(tripState)));

    saveState();
    removeTyping();
    appendMsg('assistant', res.message);

    const gw = document.getElementById('generateWrap');
    if (res.generate_ready) gw.classList.add('visible');
    else gw.classList.remove('visible');

  } catch (err) {
    removeTyping();
    appendError(`Something went wrong: ${err.message}. Please try again.`);
    console.error('[Scout/message error]', err);
  }

  busy = false;
  setSendDisabled(false);
}

async function handleGenerate() {
  if (busy) return;
  busy = true;
  const gBtn = document.getElementById('generateBtn');
  gBtn.disabled = true;
  gBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Finding matches…`;

  try {
    // POST /api/meridian/match
    const meridianOut = await callMeridianMatch();

    // POST /api/scout/present
    const presentRes = await callScoutPresent(meridianOut, 'first_presentation');

    applyStateDelta(presentRes.state_delta);
    if (presentRes.stage) tripState.stage = presentRes.stage;
    if (typeof presentRes.generate_ready === 'boolean') tripState.matcher_state.generate_ready = presentRes.generate_ready;

    // Store last_recommendations
    if (meridianOut.options) {
      tripState.matcher_state.last_recommendations = {
        options: meridianOut.options.map(o => o.destination_id),
        best_match: meridianOut.final_recommendation?.best_match,
        generated_at: new Date().toISOString(),
      };
    }

    saveState();
    document.getElementById('generateWrap').classList.remove('visible');
    appendMsg('assistant', presentRes.message);

    // Render options to the right panel
    if (meridianOut.options?.length) {
      renderRecos(meridianOut.options, meridianOut.final_recommendation);
    }

  } catch (err) {
    appendError(`Couldn't reach the recommendation engine: ${err.message}. Want to try again?`);
    console.error('[Meridian/Scout present error]', err);
  }

  busy = false;
  gBtn.disabled = false;
  gBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Generate Recommendations`;
}

function quickConfirm(name) {
  document.getElementById('userInput').value = `Let's go with ${name}`;
  handleSend();
}
function fillInput(text) { document.getElementById('userInput').value = text; document.getElementById('userInput').focus(); }
function setSendDisabled(v) { document.getElementById('sendBtn').disabled = v; }

function resetTrip() {
  localStorage.removeItem('twm_trip_state_v2');
  tripState = DEFAULT_STATE();
  saveState();
  document.getElementById('messages').innerHTML = '';
  document.getElementById('generateWrap').classList.remove('visible');
  document.getElementById('recoPanel').innerHTML = `<div class="reco-panel-empty" id="recoEmpty">Recommendations will appear here<br>once Scout is ready and you tap Generate.</div>`;
  busy = false;
  setSendDisabled(false);
  console.log('%c[Trip reset]', 'color:#c46b3a;font-weight:700;', tripState.trip_id);
  setTimeout(() => appendMsg('assistant', "Hey! I'm Scout. Tell me about the trip you have in mind — who's going, where you're thinking, or just a vibe — and I'll figure out the rest."), 200);
}

// ── Textarea ──────────────────────────────────────────────────────────────────
document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 110) + 'px';
});
document.getElementById('userInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
loadState();
renderStateBar();

setTimeout(() => {
  const ctx = tripState.matcher_state.conversation_context;
  if (ctx?.last_scout_message && tripState.stage !== 'new') {
    appendMsg('assistant', `Welcome back. ${ctx.last_scout_message}`);
    if (tripState.matcher_state.generate_ready) document.getElementById('generateWrap').classList.add('visible');
  } else {
    appendMsg('assistant', "Hey! I'm Scout. Tell me about the trip you have in mind — who's going, where you're thinking, or just a vibe — and I'll figure out the rest.");
  }
}, 250);
</script>
